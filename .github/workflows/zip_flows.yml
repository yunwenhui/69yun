name: zip_flows

on: 
  workflow_dispatch:
  push: 
    paths: 
      - '_worker.js'

permissions:
  contents: write

# 强制 Node 24，消除所有弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package-and-commit: 
    runs-on: ubuntu-latest
    steps: 
    - name: Checkout
      uses: actions/checkout@v6

    - name: Zip file
      run: zip _worker.js.zip _worker.js

    # 👇 用 GitHub 官方原生 git 命令代替旧 Action → 0 警告！
    - name: Commit & Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "actions[bot]@users.noreply.github.com"
        git add _worker.js.zip
        git commit -m "Automatically package"
        git push
