name: zip_flows

on: 
  workflow_dispatch:
  push: 
    paths: 
      - '_worker.js'

permissions:
  contents: write

# 强制 Node 24 消除弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package-and-commit: 
    runs-on: ubuntu-latest
    steps: 
    - name: Checkout Repository
      uses: actions/checkout@v6  # 已升级到最新版

    - name: Zip the worker file
      run: zip _worker.js.zip _worker.js

    - name: Commit and push the packaged file
      uses: EndBug/add-and-commit@v9  # 升级到最新版，支持 Node 24
      with:
        add: '_worker.js.zip'
        message: 'Automatically package and commit _worker.js.zip'
        author_name: github-actions[bot]
        author_email: actions[bot]@users.nore.github.com
        token: ${{ secrets.GH_TOKEN }}
